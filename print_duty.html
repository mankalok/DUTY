<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>週循環排班定案 (純淨列印版)</title>
    <style>
        :root { --primary: #1a73e8; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background: white; padding: 10px; }
        .container { max-width: 99%; margin: auto; background: white; }
        
        /* 標題區 */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        h2 { color: var(--primary); font-size: 26px; margin: 0; }

        .btn-print { 
            background: #1a73e8; color: white; border: none; padding: 10px 25px; 
            border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #333; }
        th, td { border: 1px solid #333; padding: 12px 4px; text-align: center; vertical-align: middle; }
        th { background: #f1f3f4; font-size: 18px; }
        
        /* ✨ 時段著色 (保留你原本的配色) */
        .bg-slot-1 { background-color: #e3f2fd !important; } 
        .bg-slot-2 { background-color: #e8f5e9 !important; } 
        .bg-slot-3 { background-color: #fff3e0 !important; } 
        .bg-slot-4 { background-color: #f3e5f5 !important; } 
        .bg-slot-5 { background-color: #f1f8e9 !important; } 

        /* 📊 直行間隔色：星期二 (Tue) 同 星期四 (Thu) */
        .col-stripe { background-color: #ffe0b2 !important; } 

        .slot-text { font-size: 14px; color: #555; display: block; }
        .post-text { font-size: 20px; font-weight: bold; display: block; margin-top: 4px; }

        /* ✨ 放大後的人名樣式 */
        .staff-name-big { 
            font-size: 28px; font-weight: 900; color: #d93025; 
            text-shadow: 1px 1px 0px #fff;
        }

        /* 統計區 */
        .count-section { margin-top: 30px; border-top: 2px solid #333; padding-top: 15px; }
        .count-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .count-item { border: 1px solid #ccc; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        .count-num { font-weight: bold; color: #d93025; }

        #loading { text-align: center; padding: 80px; font-size: 24px; color: #1a73e8; }

        /* 🖨️ 列印設定 */
        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            @page { size: landscape; margin: 1cm; }
            table { border: 2px solid #000; }
            th, td { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">⏳ 正在讀取排班數據...</div>

    <div id="mainContent" style="display:none;">
        <div class="header-box no-print">
            <h2>🗓️ 週循環排班定案總表</h2>
            <button type="button" class="btn-print" onclick="window.print()">🖨️ 立即列印 / 儲存 PDF</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 160px;">時段-崗位</th>
                    <th>一 (Mon)</th>
                    <th class="col-stripe">二 (Tue)</th>
                    <th>三 (Wed)</th>
                    <th class="col-stripe">四 (Thu)</th>
                    <th>五 (Fri)</th>
                </tr>
            </thead>
            <tbody id="setupBody"></tbody>
        </table>

        <div class="count-section">
            <h3>📊 總計當值次數</h3>
            <div id="countDisplay" class="count-grid"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOfS14IgZ-Ymmk-6lVByZhAyEp1xeZbupTGOoTSdyJf0V_ehNTQJQ6kh97qBy9sMTY/exec"; 
    let structure = [], staffList = [], currentTemplate = [];

    window.onload = init;

    async function init() {
        try {
            const fetchData = async (action) => {
                const res = await fetch(`${SCRIPT_URL}?action=${action}`);
                return res.json();
            };
            [structure, staffList, currentTemplate] = await Promise.all([
                fetchData('getStructure'),
                fetchData('getStaffList'),
                fetchData('getDutyTemplate')
            ]);
            renderTable();
            updateCounts();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } catch (e) {
            alert("❌ 數據讀取失敗，請檢查網路。");
        }
    }

    function renderTable() {
        const body = document.getElementById('setupBody');
        const unique = [];
        const seen = new Set();
        const slotNames = [...new Set(structure.map(item => item[1]))];

        structure.forEach(item => {
            const key = `${item[1]}|${item[2]}`; 
            if (!seen.has(key)) { unique.push({ slot: item[1], post: item[2] }); seen.add(key); }
        });

        body.innerHTML = unique.map(p => {
            const colorIdx = (slotNames.indexOf(p.slot) % 5) + 1;
            const bgClass = `bg-slot-${colorIdx}`;
            
            let rowHtml = `<tr>
                <td class="${bgClass}" style="text-align:left;">
                    <span class="slot-text">${p.slot}</span>
                    <span class="post-text">${p.post}</span>
                </td>`;
            
            const savedRow = Array.isArray(currentTemplate) ? currentTemplate.find(r => r[0] == p.slot && r[1] == p.post) : null;

            for (let i = 0; i < 5; i++) {
                const isStripe = (i === 1 || i === 3) ? "col-stripe" : ""; 
                const savedName = savedRow ? (savedRow[i + 2] || "--") : "--";
                
                rowHtml += `<td class="${isStripe}">
                    <div class="staff-name-big">${savedName}</div>
                </td>`;
            }
            return rowHtml + `</tr>`;
        }).join('');
    }

    function updateCounts() {
        const counts = {};
        staffList.forEach(n => counts[n] = 0);
        
        // 喺 currentTemplate 入面計數
        currentTemplate.forEach(row => {
            for (let i = 2; i <= 6; i++) { // Mon 到 Fri
                const name = row[i];
                if (name && counts.hasOwnProperty(name)) counts[name]++;
            }
        });

        document.getElementById('countDisplay').innerHTML = staffList
            .filter(n => counts[n] > 0) // 只顯示有當值嘅人
            .map(n => `
                <div class="count-item"><span>${n}</span><span class="count-num">${counts[n]}</span></div>
            `).join('');
    }
</script>
<div style="text-align: center; margin-top: 30px; padding: 20px;">
    <a href="index.html" style="color: #1a73e8; text-decoration: none; font-weight: bold;">← 返回導覽首頁</a>
</div>
</body>
</html>
