<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人當值時間表 (按人名統計)</title>
    <style>
        :root { --primary: #1a73e8; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background: white; padding: 10px; }
        .container { max-width: 99%; margin: auto; background: white; }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        h2 { color: var(--primary); font-size: 26px; margin: 0; }

        .btn-print { 
            background: #34a853; color: white; border: none; padding: 10px 25px; 
            border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #333; }
        th, td { border: 1px solid #333; padding: 10px 4px; text-align: center; vertical-align: top; }
        th { background: #f1f3f4; font-size: 18px; }
        
        /* 姓名欄位特別樣式 */
        .name-col { background-color: #fff9e6 !important; font-size: 22px; font-weight: 900; color: #d93025; vertical-align: middle; }

        /* ✨ 時段著色標籤 (還原 image_e00027.png 樣式) */
        .slot-tag {
            display: inline-block;
            background-color: #e3f2fd;
            color: #1a73e8;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 4px;
            border: 1px solid #c2e7ff;
            font-weight: normal;
        }
        .duty-item { margin-bottom: 8px; padding: 4px; border-bottom: 1px dashed #eee; }
        .duty-item:last-child { border-bottom: none; }
        .post-text { font-size: 16px; font-weight: bold; display: block; color: #333; }

        /* 📊 直行間隔色：星期二 同 星期四 */
        .col-stripe { background-color: #ffe0b2 !important; } 

        #loading { text-align: center; padding: 80px; font-size: 24px; color: #1a73e8; }

        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            @page { size: landscape; margin: 1cm; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">⏳ 正在按人名生成時間表...</div>

    <div id="mainContent" style="display:none;">
        <div class="header-box no-print">
            <h2>👥 個人當值時間表 (週一至週五)</h2>
            <button type="button" class="btn-print" onclick="window.print()">🖨️ 列印個人表 / PDF</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 120px;">人員姓名</th>
                    <th>一 (Mon)</th>
                    <th class="col-stripe">二 (Tue)</th>
                    <th>三 (Wed)</th>
                    <th class="col-stripe">四 (Thu)</th>
                    <th>五 (Fri)</th>
                </tr>
            </thead>
            <tbody id="personalBody"></tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOfS14IgZ-Ymmk-6lVByZhAyEp1xeZbupTGOoTSdyJf0V_ehNTQJQ6kh97qBy9sMTY/exec"; 
    let staffList = [], currentTemplate = [];

    window.onload = init;

    async function init() {
        try {
            const fetchData = async (action) => {
                const res = await fetch(`${SCRIPT_URL}?action=${action}`);
                return res.json();
            };
            [staffList, currentTemplate] = await Promise.all([
                fetchData('getStaffList'),
                fetchData('getDutyTemplate')
            ]);
            renderPersonalTable();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } catch (e) {
            alert("❌ 數據讀取失敗。");
        }
    }

    function renderPersonalTable() {
        const body = document.getElementById('personalBody');
        
        // 整理數據：以「人」為 Key
        const personData = {};
        staffList.forEach(name => {
            personData[name] = { 0:[], 1:[], 2:[], 3:[], 4:[] }; // 代表 Mon-Fri
        });

        // 掃描所有排班紀錄 (currentTemplate 格式: [Slot, Post, MonName, TueName...])
        currentTemplate.forEach(row => {
            const slot = row[0];
            const post = row[1];
            for (let i = 0; i < 5; i++) {
                const staffInCell = row[i + 2];
                if (staffInCell && personData[staffInCell]) {
                    personData[staffInCell][i].push({ slot, post });
                }
            }
        });

        // 渲染表格
        body.innerHTML = staffList.map(name => {
            let rowHtml = `<tr><td class="name-col">${name}</td>`;
            
            for (let i = 0; i < 5; i++) {
                const isStripe = (i === 1 || i === 3) ? "col-stripe" : "";
                const duties = personData[name][i];
                
                let cellContent = duties.map(d => `
                    <div class="duty-item">
                        <span class="slot-tag">${d.slot}</span>
                        <span class="post-text">${d.post}</span>
                    </div>
                `).join('');

                rowHtml += `<td class="${isStripe}">${cellContent || "--"}</td>`;
            }
            return rowHtml + `</tr>`;
        }).join('');
    }
</script>
<div style="text-align: center; margin-top: 30px; padding: 20px;">
    <a href="index.html" style="color: #1a73e8; text-decoration: none; font-weight: bold;">← 返回導覽首頁</a>
</div>
</body>
</html>
