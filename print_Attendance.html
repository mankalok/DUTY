<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>當值紀錄統計 (列印版)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background: white; }
        .box { max-width: 900px; margin: auto; }
        
        /* 頂部控制區 - 列印時會隱藏 */
        .no-print { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #eee; }

        /* 統計區樣式 */
        .summary-section { margin-top: 30px; border-top: 2px solid #333; padding-top: 15px; }
        .summary-table { width: 50%; min-width: 300px; }
        
        .loading { color: orange; font-weight: bold; display: none; }
        
        /* 🖨️ 列印設定 */
        @media print {
            .no-print { display: none; }
            body { padding: 0; }
            .box { max-width: 100%; }
        }

        /* 時段分組色 (淡淡地，唔影響睇字) */
        .slot-c1 { background-color: #f0f7ff !important; }
        .slot-c2 { background-color: #f0fff0 !important; }
        .slot-c3 { background-color: #fffaf0 !important; }
        .slot-c4 { background-color: #faf0ff !important; }
        .slot-c5 { background-color: #f5fff0 !important; }
    </style>
</head>
<body>

<div class="box">
    <div class="no-print">
        <h2>📊 查看與列印當值統計</h2>
        <label>選擇日期：</label>
        <input type="date" id="queryDate">
        <button onclick="loadReport()" style="padding: 5px 15px; cursor: pointer;">🔍 產生報表</button>
        <button onclick="window.print()" style="padding: 5px 15px; cursor: pointer; margin-left: 10px;">🖨️ 列印 / 轉 PDF</button>
    </div>

    <div id="loading" class="loading">⏳ 正在讀取資料...</div>

    <div id="reportContent" style="display:none;">
        <h2 id="displayDate" style="text-align: center;">當值紀錄表</h2>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">時段</th>
                    <th style="width: 30%;">崗位</th>
                    <th style="width: 20%;">當值人員</th>
                    <th style="width: 20%;">狀態</th>
                </tr>
            </thead>
            <tbody id="reportTableBody"></tbody>
        </table>

        <div class="summary-section">
            <h3>👥 出勤人數統計 (按人名)</h3>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>人員姓名</th>
                        <th>出席次數 (Present)</th>
                    </tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVDVG_0R2JBIGGOYwqw0Nm9srECrYPMqfJ5E3yxU9GOKgfpKklOwWit0rZeGrlI4FM/exec"; 

    async function loadReport() {
        const date = document.getElementById('queryDate').value;
        if (!date) return alert("請選日期");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('reportContent').style.display = 'none';

        try {
            const response = await fetch(`${SCRIPT_URL}?action=getExistingLog&date=${date}`);
            const logs = await response.json();

            if (logs.length === 0) {
                alert("此日期沒有紀錄");
                document.getElementById('loading').style.display = 'none';
                return;
            }

            document.getElementById('displayDate').innerText = date + " 當值紀錄表";
            
            const tableBody = document.getElementById('reportTableBody');
            const summaryBody = document.getElementById('summaryBody');
            tableBody.innerHTML = "";
            summaryBody.innerHTML = "";

            let stats = {}; // 用嚟計數
            let colorMap = {};
            let colorIndex = 0;
            const classes = ['slot-c1', 'slot-c2', 'slot-c3', 'slot-c4', 'slot-c5'];

            logs.forEach(row => {
                const slot = row[2];
                const post = row[3];
                const name = row[4];
                const status = row[5];

                // 1. 填寫清單表格
                if (!colorMap[slot]) {
                    colorMap[slot] = classes[colorIndex % classes.length];
                    colorIndex++;
                }

                const tr = document.createElement('tr');
                tr.className = colorMap[slot];
                tr.innerHTML = `
                    <td>${slot}</td>
                    <td>${post}</td>
                    <td><b>${name}</b></td>
                    <td>${status === 'Present' ? '✅ 出席' : '❌ 缺席'}</td>
                `;
                tableBody.appendChild(tr);

                // 2. 統計出席次數 (只計 Present)
                if (status === 'Present') {
                    stats[name] = (stats[name] || 0) + 1;
                }
            });

            // 3. 填寫統計表格
            for (let person in stats) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${person}</td><td>${stats[person]}</td>`;
                summaryBody.appendChild(tr);
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('reportContent').style.display = 'block';
        } catch (e) {
            alert("讀取失敗: " + e.message);
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
<div style="text-align: center; margin-top: 30px; padding: 20px;">
    <a href="index.html" style="color: #1a73e8; text-decoration: none; font-weight: bold;">← 返回導覽首頁</a>
</div>
</body>
</html>
