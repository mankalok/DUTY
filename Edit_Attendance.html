<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>修改考勤紀錄</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fffde7; }
        .box { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #fbc02d; }
        
        /* ✨ 新增：時段分組底色 */
        .slot-c1 { background-color: #e3f2fd !important; } /* 藍 */
        .slot-c2 { background-color: #e8f5e9 !important; } /* 綠 */
        .slot-c3 { background-color: #fff3e0 !important; } /* 橙 */
        .slot-c4 { background-color: #f3e5f5 !important; } /* 紫 */
        .slot-c5 { background-color: #f1f8e9 !important; } /* 青 */

        .loading { color: orange; font-weight: bold; display: none; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-search { background: #f9a825; }
        .btn-save { background: #2e7d32; width: 100%; margin-top: 20px; font-size: 16px; }
        
        .btn-del { background: #d32f2f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-del:hover { background: #b71c1c; }
    </style>
</head>
<body>

<div class="box">
    <h2>🛠️ 修改已提交考勤 (分色版)</h2>
    <div style="margin-bottom: 20px;">
        <label>選擇日期：</label>
        <input type="date" id="queryDate">
        <button class="btn btn-search" onclick="loadData()">🔍 讀取紀錄</button>
    </div>

    <div id="loading" class="loading">⏳ 正在通訊中...</div>

    <div id="content" style="display:none;">
        <table id="editTable">
            <thead>
                <tr>
                    <th>時段/崗位</th>
                    <th>人員 (可換人)</th>
                    <th>狀態</th>
                    <th>備註</th>
                    <th>操作</th> </tr>
            </thead>
            <tbody id="editBody"></tbody>
        </table>
        <button class="btn btn-save" onclick="updateData()">💾 儲存修改</button>
    </div>
    <div id="noData" style="display:none; color: gray; text-align:center;">此日期沒有紀錄。</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVDVG_0R2JBIGGOYwqw0Nm9srECrYPMqfJ5E3yxU9GOKgfpKklOwWit0rZeGrlI4FM/exec"; 

    async function loadData() {
        const date = document.getElementById('queryDate').value;
        if (!date) return alert("請選日期");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('content').style.display = 'none';
        document.getElementById('noData').style.display = 'none';

        try {
            const [logRes, staffRes] = await Promise.all([
                fetch(`${SCRIPT_URL}?action=getExistingLog&date=${date}`),
                fetch(`${SCRIPT_URL}?action=getStaffList`)
            ]);

            const logs = await logRes.json();
            const staffList = await staffRes.json();

            if (!Array.isArray(logs)) {
                throw new Error("後台回傳格式錯誤：" + JSON.stringify(logs));
            }

            if (logs.length === 0) {
                document.getElementById('noData').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                return;
            }

            const body = document.getElementById('editBody');
            body.innerHTML = "";
            const options = staffList.map(n => `<option value="${n}">${n}</option>`).join('');

            // --- 🎨 著色邏輯：自動分配顏色給唔同時段 ---
            let colorMap = {};
            let colorIndex = 0;
            const classes = ['slot-c1', 'slot-c2', 'slot-c3', 'slot-c4', 'slot-c5'];

            logs.forEach(row => {
                const slotName = row[2]; // 時段名
                if (!colorMap[slotName]) {
                    colorMap[slotName] = classes[colorIndex % classes.length];
                    colorIndex++;
                }

                const tr = document.createElement('tr');
                tr.className = colorMap[slotName]; // 幫成行加底色
                tr.innerHTML = `
                    <td><b>${row[2]}</b><br>${row[3]}</td>
                    <td><select class="s-staff">${options}</select></td>
                    <td>
                        <select class="s-status">
                            <option value="Present" ${row[5]==='Present'?'selected':''}>✅ 出席</option>
                            <option value="Absent" ${row[5]==='Absent'?'selected':''}>❌ 缺席</option>
                        </select>
                    </td>
                    <td><input type="text" class="i-remark" value="${row[6]||''}"></td>
                    <td><button class="btn-del" onclick="deleteRow(this)">🗑️ 刪除</button></td> `;
                
                tr.querySelector('.s-staff').value = row[4];
                tr.dataset.slot = row[2];
                tr.dataset.post = row[3];
                body.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        } catch (e) {
            alert("錯誤: " + e.message);
            document.getElementById('loading').style.display = 'none';
        }
    }

    function deleteRow(btn) {
        if(confirm("確定要暫時移除此項目嗎？\n(注意：必須按下「儲存修改」後，資料庫才會正式刪除)")){
            const row = btn.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }
    }

    async function updateData() {
        const date = document.getElementById('queryDate').value;
        const rows = document.querySelectorAll('#editBody tr');
        
        const records = Array.from(rows).map(tr => ({
            slot: tr.dataset.slot,
            post: tr.dataset.post,
            staff: tr.querySelector('.s-staff').value,
            status: tr.querySelector('.s-status').value,
            remarks: tr.querySelector('.i-remark').value
        }));

        if(!confirm(`確定提交修改？\n目前紀錄總數：${records.length} 條`)) return;

        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerText = "⏳ 儲存中...";
        saveBtn.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'submitAttendance', date: date, records: records })
            });
            const result = await response.text();
            alert("更新成功: " + result);
            loadData();
        } catch (e) { 
            alert("失敗: " + e.message); 
        } finally {
            saveBtn.innerText = "💾 儲存修改";
            saveBtn.disabled = false;
        }
    }
</script>
<div style="text-align: center; margin-top: 30px; padding: 20px;">
    <a href="index.html" style="color: #1a73e8; text-decoration: none; font-weight: bold;">← 返回導覽首頁</a>
</div>
</body>
</html>
