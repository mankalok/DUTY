<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>崗位結構管理系統</title>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #1e8e3e; --bg: #f1f3f4; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; padding: 20px; background: var(--bg); margin-bottom: 100px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #e8f0fe; border: 1px solid #c1d5fa; padding: 12px 20px; border-radius: 8px; font-size: 14px; color: #444; }
        .stat-card b { color: var(--primary); font-size: 18px; margin: 0 5px; }

        .toolbar { background: #fffde7; padding: 15px; border: 1px solid #ffe082; display: flex; gap: 10px; margin-bottom: 20px; border-radius: 8px; flex-wrap: wrap; align-items: center; }
        .filter-box { background: #f8f9fa; padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; color: #5f6368; font-size: 14px; position: sticky; top: 0; }
        
        /* 星期色彩條 (支援 1-7) */
        .row-day-1 { border-left: 6px solid #4285f4; }
        .row-day-2 { border-left: 6px solid #34a853; }
        .row-day-3 { border-left: 6px solid #fbbc05; }
        .row-day-4 { border-left: 6px solid #ea4335; }
        .row-day-5 { border-left: 6px solid #a142f4; }
        .row-day-6 { border-left: 6px solid #ff7043; }
        .row-day-7 { border-left: 6px solid #795548; }

        .sort-control { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .btn-move { width: 34px; height: 24px; font-size: 12px; background: white; border: 1px solid #ccc; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-move:hover { background: #e8f0fe; border-color: var(--primary); color: var(--primary); }

        select, input { width: 92%; padding: 8px; border: 1px solid #dadce0; border-radius: 6px; font-size: 14px; outline: none; }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.1); }

        .btn { padding: 8px 16px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; display: flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-delete { background: #fff; color: var(--danger); border: 1px solid var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }
        .btn-copy { background: #fff; color: #555; border: 1px solid #ccc; }
        .btn-copy:hover { background: #eee; }

        .btn-save { background: var(--success); color: white; position: fixed; bottom: 30px; right: 30px; padding: 16px 50px; font-size: 18px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); z-index: 1000; cursor: pointer; border: none; }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-save:disabled { background: #999; cursor: not-allowed; transform: none; }

        .btn-back { text-decoration: none; color: var(--primary); border: 2px solid var(--primary); padding: 8px 20px; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); color: white; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 999; display: flex; align-items: center; }

        @keyframes highlight { from { background: #fffde7; } to { background: transparent; } }
        .flash { animation: highlight 1.5s; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ 崗位結構管理系統</h2>

    <div class="stats-bar" id="statsBar">
        <div class="stat-card">加載中...</div>
    </div>

    <div class="toolbar">
        <button class="btn btn-add" onclick="addNewRow()">➕ 新增崗位</button>
        <button class="btn" style="background:#607d8b; color:white;" onclick="autoSortByNumber()">🔃 按數字重排 (星期+Sort)</button>
        <button class="btn" style="background:#ffa000; color:white;" onclick="exportCSV()">📤 匯出 CSV 備份</button>
        <button class="btn" style="background:#78909c; color:white;" onclick="document.getElementById('csvIn').click()">📥 匯入 CSV 覆蓋</button>
        <input type="file" id="csvIn" style="display:none;" accept=".csv" onchange="importCSV(this)">
    </div>

    <div class="filter-box">
        <label>🔍 快速篩選 (數字 1-7)：</label>
        <select id="filterDay" onchange="render()" style="width: 130px;">
            <option value="all">顯示全部</option>
            <option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option>
            <option value="7">7</option>
        </select>
        <input type="text" id="filterText" oninput="render()" placeholder="搜尋關鍵字 (時段/崗位)..." style="width: 250px;">
    </div>

    <table id="dutyTable">
        <thead>
            <tr>
                <th style="width: 60px;">對調</th>
                <th style="width: 80px;">Sort</th>
                <th style="width: 120px;">星期 (1-7)</th>
                <th style="width: 200px;">時段 (Slot)</th>
                <th>崗位名稱 (PostName)</th>
                <th style="width: 130px;">操作</th>
            </tr>
        </thead>
        <tbody id="dutyBody"></tbody>
    </table>
</div>

<div class="footer">
    <a href="index.html" class="btn-back">← 返回首頁</a>
    <button class="btn btn-save" id="saveBtn" onclick="saveData()">💾 儲存所有變更至雲端</button>
    <span style="color: #666; font-size: 14px; margin-left: 20px;">* 修改後請務必點擊儲存按鈕</span>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz59QqwgaoGhnDlBK2eb7QyQLFl3_ljgrudXsF8ieqic8oUtYU3qOEXV697tYbViuk_/exec"; 
    let dutyData = [];

    window.onload = async () => {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getStructure`);
            const raw = await res.json();
            dutyData = (raw && raw.length > 0) ? raw.map(r => [
                parseInt(r[0]) || 1, 
                String(r[1] || ""), 
                String(r[2] || ""), 
                parseInt(r[3]) || 99
            ]) : [];
            render();
        } catch(e) { 
            console.error(e);
            alert("⚠️ 讀取失敗！"); 
            render();
        }
    };

    function updateStats() {
        const total = dutyData.length;
        const slots = [...new Set(dutyData.map(r => r[1]))].filter(s => s).length;
        document.getElementById('statsBar').innerHTML = `
            <div class="stat-card">總崗位數：<b>${total}</b></div>
            <div class="stat-card">時段總數：<b>${slots}</b></div>
        `;
    }

    function render(highlightIdx = null) {
        const body = document.getElementById('dutyBody');
        const fDay = document.getElementById('filterDay').value;
        const fText = document.getElementById('filterText').value.toLowerCase();
        let html = "";
        
        dutyData.forEach((row, idx) => {
            if ((fDay !== "all" && String(row[0]) !== fDay) || 
                (!String(row[1]).toLowerCase().includes(fText) && !String(row[2]).toLowerCase().includes(fText))) return;

            html += `
            <tr class="row-day-${row[0]} ${highlightIdx === idx ? 'flash' : ''}">
                <td>
                    <div class="sort-control">
                        <button class="btn-move" onclick="swapRows(${idx}, ${idx - 1})">▲</button>
                        <button class="btn-move" onclick="swapRows(${idx}, ${idx + 1})">▼</button>
                    </div>
                </td>
                <td><input type="number" style="font-weight:bold;" value="${row[3]}" onchange="update(${idx}, 3, this.value)"></td>
                <td>
                    <input type="number" min="1" max="7" value="${row[0]}" onchange="update(${idx}, 0, this.value); render();">
                </td>
                <td><input type="text" value="${row[1]}" onchange="update(${idx}, 1, this.value)"></td>
                <td><input type="text" value="${row[2]}" onchange="update(${idx}, 2, this.value)"></td>
                <td>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <button class="btn btn-copy" onclick="copyRow(${idx})" title="複製">📋</button>
                        <button class="btn btn-delete" onclick="deleteRow(${idx})" title="刪除">🗑️</button>
                    </div>
                </td>
            </tr>`;
        });
        body.innerHTML = html;
        updateStats();
    }

    function swapRows(i, j) {
        if (j < 0 || j >= dutyData.length) return;
        const temp = dutyData[i];
        dutyData[i] = dutyData[j];
        dutyData[j] = temp;
        render(j);
    }

    function update(r, c, v) { 
        dutyData[r][c] = (c === 0 || c === 3) ? parseInt(v) : v; 
    }

    function copyRow(idx) {
        const newRow = [...dutyData[idx]];
        dutyData.splice(idx + 1, 0, newRow);
        render(idx + 1);
    }

    function deleteRow(idx) {
        if(confirm("確定刪除此崗位嗎？")) {
            dutyData.splice(idx, 1);
            render();
        }
    }

    function addNewRow() {
        // 新增時預設為星期 1，Sort 99
        dutyData.push([1, "", "", 99]);
        render(dutyData.length - 1);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function autoSortByNumber() {
        dutyData.sort((a, b) => (a[0] - b[0]) || (a[3] - b[3]));
        render();
        alert("已按數字完成自動排序！");
    }

    async function saveData() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "⌛ 正在同步...";
        btn.disabled = true;
        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: 'saveStructure', data: dutyData }) 
            });
            alert("✅ 儲存成功！");
        } catch(e) { 
            alert("❌ 儲存失敗"); 
        }
        btn.innerText = "💾 儲存所有變更至雲端";
        btn.disabled = false;
    }

    function exportCSV() {
        let csv = "\ufeffDay,SlotName,PostName,Sort\n";
        dutyData.forEach(r => csv += `"${r[0]}","${r[1]}","${r[2]}","${r[3]}"\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Duty_Structure_Backup.csv";
        a.click();
    }

    function importCSV(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const lines = e.target.result.split("\n").filter(l => l.trim());
                dutyData = lines.slice(1).map(line => {
                    const res = line.split(",").map(v => v.replace(/^"|"$/g, ''));
                    return [parseInt(res[0])||1, res[1]||"", res[2]||"", parseInt(res[3])||99];
                });
                render();
                alert("匯入成功！記得儲存。");
            } catch(err) { alert("匯入失敗"); }
        };
        reader.readAsText(input.files[0]);
    }
</script>
</body>
</html>
