<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人出勤區間統計明細</title>
    <style>
        :root { --primary: #1a73e8; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 控制區 */
        .controls { 
            background: #e8f0fe; padding: 20px; border-radius: 10px; margin-bottom: 25px; 
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center; border: 1px solid #c6dafb;
        }
        .controls label { font-weight: bold; color: #333; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-print { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #f1f3f4; font-size: 15px; }

        /* 分組標題：人名 */
        .name-header { 
            background: #fff3e0 !important; text-align: left !important; padding-left: 20px !important;
            font-size: 20px; font-weight: 900; color: #e65100; border-top: 3px solid #333 !important;
        }
        
        /* 狀態顏色 */
        .status-present { color: var(--success); font-weight: bold; }
        .status-absent { color: var(--danger); font-weight: bold; }
        
        /* 小計列 */
        .summary-row { background: #fafafa; font-weight: bold; font-size: 16px; border-bottom: 2px solid #333; }
        .rate-badge { background: #fff9e6; padding: 2px 8px; border: 1px solid #ffe082; border-radius: 4px; }

        #loading { display: none; text-align: center; padding: 30px; font-size: 20px; color: var(--primary); }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
            table { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>📊 個人出勤區間明細統計</h2>
        <div class="controls">
            <label>日期範圍：</label>
            <input type="date" id="start">
            <span>至</span>
            <input type="date" id="end">
            <button class="btn-search" onclick="fetchData()">🔍 查詢明細</button>
            <button class="btn-print" onclick="window.print()">🖨️ 列印 / 存 PDF</button>
        </div>
    </div>

    <div id="loading">⏳ 正在讀取並分類紀錄，請稍候...</div>

    <div id="reportArea" style="display:none;">
        <h2 id="reportTitle" style="text-align: center; margin-bottom: 5px;">個人出勤統計報告</h2>
        <p id="dateInfo" style="text-align: center; color: #666; margin-bottom: 20px; font-weight: bold;"></p>
        
        <div id="content"></div>
    </div>
</div>

<script>
    // 👈 記得放入你部署後最新嘅 SCRIPT_URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMSvBoBG_GJzFSngd0x1CI1jkdZlGHbVpIzHESbvBaQqNjjRObjv22Q_BRlPQ2WjM_/exec"; 

    async function fetchData() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        if(!start || !end) return alert("請先揀選開始同結束日期");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('reportArea').style.display = 'none';

        try {
            // Call 後台你啱啱更新咗嘅 getExistingLog
            const res = await fetch(`${SCRIPT_URL}?action=getExistingLog&startDate=${start}&endDate=${end}`);
            const logs = await res.json();

            if (!logs || logs.length === 0) {
                alert("此區間內冇任何紀錄");
                document.getElementById('loading').style.display = 'none';
                return;
            }

            document.getElementById('dateInfo').innerText = `統計日期：${start} 至 ${end}`;
            renderReport(logs);

        } catch (e) {
            alert("錯誤: " + e.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function renderReport(logs) {
        const content = document.getElementById('content');
        content.innerHTML = "";

        // 按人名分組
        let personMap = {};
        logs.forEach(row => {
            const date = new Date(row[0]).toLocaleDateString('zh-HK');
            const slot = row[2];  // 課前/小息
            const post = row[3];  // 崗位
            const name = row[4];  // 人員
            const status = row[5]; // 出席/缺席
            
            if (!personMap[name]) personMap[name] = [];
            personMap[name].push({ date, slot, post, status });
        });

        // 按人名排序並生成 HTML
        let tableHtml = `<table>
            <thead>
                <tr>
                    <th style="width: 25%;">日期</th>
                    <th style="width: 20%;">時段</th>
                    <th style="width: 30%;">崗位</th>
                    <th style="width: 25%;">狀態</th>
                </tr>
            </thead>
            <tbody>`;

        Object.keys(personMap).sort().forEach(name => {
            // 加入人名分組標題列
            tableHtml += `<tr><td colspan="4" class="name-header">👤 同事：${name}</td></tr>`;
            
            let presentCount = 0;
            personMap[name].forEach(d => {
                const isPresent = d.status === 'Present';
                if (isPresent) presentCount++;
                
                tableHtml += `<tr>
                    <td>${d.date}</td>
                    <td>${d.slot}</td>
                    <td>${d.post}</td>
                    <td class="${isPresent ? 'status-present' : 'status-absent'}">
                        ${isPresent ? '✅ 出席' : '❌ 缺席'}
                    </td>
                </tr>`;
            });

            // 加入個人小計列
            const total = personMap[name].length;
            const rate = ((presentCount / total) * 100).toFixed(1);
            tableHtml += `<tr class="summary-row">
                <td colspan="4" style="text-align: right; padding-right: 20px;">
                    個人總計：應到 ${total} 次 / 實到 ${presentCount} 次 
                    <span class="rate-badge">出勤率：${rate}%</span>
                </td>
            </tr>`;
        });

        tableHtml += `</tbody></table>`;
        content.innerHTML = tableHtml;
        document.getElementById('reportArea').style.display = 'block';
    }
</script>
<div style="text-align: center; margin-top: 30px; padding: 20px;">
    <a href="index.html" style="color: #1a73e8; text-decoration: none; font-weight: bold;">← 返回導覽首頁</a>
</div>
</body>
</html>
